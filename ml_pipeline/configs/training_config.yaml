# ═══════════════════════════════════════════════════════════
# SolarMind AI — Training Configuration
# Central config for all model training pipelines
# ═══════════════════════════════════════════════════════════

# ── Dataset ──
dataset:
  name: "PV Defect Dataset"
  path: "./data/pv_defect_dataset"
  classes:
    - normal
    - micro_crack
    - hotspot
    - dust_soiling
  num_classes: 4
  splits:
    train: 0.7
    val: 0.15
    test: 0.15

# ── ViT Model (Defect Classification) ──
vit:
  model_name: "vit_base_patch16_224"
  pretrained: true
  pretrained_source: "ImageNet-21k"
  input_size: 224
  patch_size: 16
  embed_dim: 768
  num_heads: 12
  num_layers: 12
  dropout: 0.1

  training:
    batch_size: 32
    epochs: 50
    learning_rate: 3.0e-4
    weight_decay: 0.01
    optimizer: "AdamW"
    scheduler: "CosineAnnealingWarmRestarts"
    scheduler_params:
      T_0: 10
      T_mult: 2
    loss_function: "FocalLoss"
    focal_gamma: 2.0
    focal_alpha: [0.15, 0.35, 0.25, 0.25]
    label_smoothing: 0.1
    mixed_precision: true
    gradient_clip_max_norm: 1.0
    early_stopping:
      patience: 10
      metric: "val_f1"
      mode: "max"

  augmentation:
    random_resized_crop:
      scale: [0.8, 1.0]
    horizontal_flip: 0.5
    vertical_flip: 0.3
    rotation: 15
    color_jitter:
      brightness: 0.3
      contrast: 0.3
      saturation: 0.1
    gaussian_blur:
      kernel_size: 3
      sigma: [0.1, 2.0]
    random_erasing: 0.2
    affine_translate: [0.1, 0.1]

  checkpoint:
    save_dir: "./checkpoints/vit"
    save_best_only: true
    monitor: "val_f1"

# ── YOLOv8 Model (Defect Detection & Localization) ──
yolo:
  model_variant: "yolov8m.pt"
  data_yaml: "./data/solar_defects.yaml"
  img_size: 640
  classes:
    - micro_crack
    - hotspot
    - dust_soiling
    - panel

  training:
    epochs: 100
    batch_size: 16
    patience: 20
    device: "0"  # GPU 0, or "cpu"

  augmentation:
    mosaic: 1.0
    mixup: 0.1
    hsv_h: 0.015
    hsv_s: 0.7
    hsv_v: 0.4
    degrees: 15.0
    translate: 0.1
    scale: 0.5
    flipud: 0.3
    fliplr: 0.5

  checkpoint:
    save_dir: "./runs/detect/solarmind"

# ── Fusion Model ──
fusion:
  visual_backbone: "vit_base_patch16_224"
  visual_embed_dim: 768
  telemetry_features:
    - irradiance
    - temperature
    - power_output
    - voltage
    - current
    - humidity
  telemetry_embed_dim: 128
  fusion_dim: 512
  fusion_method: "cross_attention"
  num_attention_heads: 8
  dropout: 0.2

  training:
    batch_size: 16
    epochs: 30
    learning_rate: 1.0e-4
    weight_decay: 0.01

# ── Evaluation ──
evaluation:
  metrics:
    - precision
    - recall
    - f1_score
    - mAP
    - confusion_matrix
  output_dir: "./evaluation_results"
  confidence_threshold: 0.5
  nms_iou_threshold: 0.45

# ── Hardware ──
hardware:
  device: "cuda"  # "cuda", "cpu", or "mps" for Apple Silicon
  num_workers: 4
  pin_memory: true
  seed: 42
